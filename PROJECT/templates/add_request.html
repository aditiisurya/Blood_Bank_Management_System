<!DOCTYPE html>
<html>
<head>
    <title>Add Blood Request - Smart Blood Bank</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .form-card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- PAGE HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>🩸 Add Blood Request</h3>
        <a href="/requests" class="btn btn-outline-danger">Back to Requests</a>
    </div>

    <!-- FORM CARD -->
    <div class="card shadow-lg form-card">
        <div class="card-body">

            <form method="POST">

                <!-- Patient Name -->
                <div class="mb-3">
                    <label class="form-label">Patient Name</label>
                    <input type="text" 
                           name="patient_name" 
                           class="form-control"
                           placeholder="Enter patient name"
                           required>
                </div>

                <!-- Blood Group -->
                <div class="mb-3">
                    <label class="form-label">Blood Group</label>
                    <select name="blood_group" class="form-select" required>
                        <option value="">Select Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="B+">B+</option>
                        <option value="O+">O+</option>
                        <option value="AB+">AB+</option>
                        <option value="A-">A-</option>
                        <option value="B-">B-</option>
                        <option value="O-">O-</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>

                <!-- Units Required -->
                <div class="mb-3">
                    <label class="form-label">Units Required</label>
                    <input type="number" 
                           name="units_required" 
                           class="form-control"
                           min="1"
                           placeholder="Enter units required"
                           required>
                </div>

                <!-- Submit Button -->
                <div class="text-end">
                    <button type="submit" class="btn btn-danger">
                        Submit Request
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
