```html
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Donor - Blood Bank System</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>

        body{
            background: linear-gradient(135deg,#ff4b5c,#ff7a7a);
            min-height:100vh;
        }

        .card{
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        .form-title{
            font-weight:600;
        }

        .btn-custom{
            background:#ff4b5c;
            border:none;
        }

        .btn-custom:hover{
            background:#e63b4c;
        }

    </style>
</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card p-4">

                <h3 class="text-center form-title mb-4">
                    <i class="bi bi-person-plus-fill"></i> Add New Donor
                </h3>

                <!-- Flash Message -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category,message in messages %}
                        <div class="alert alert-{{category}} alert-dismissible fade show">
                            {{message}}
                            <button class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
                {% endwith %}

                <!-- Donor Form -->
                <form method="POST" action="{{ url_for('add_donor') }}">

                    <!-- Donor Name -->
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-person"></i> Donor Name
                        </label>

                        <input type="text"
                               name="donor_name"
                               class="form-control"
                               placeholder="Enter donor name"
                               required>
                    </div>

                    <!-- Blood Group -->
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-droplet-fill"></i> Blood Group
                        </label>

                        <select name="blood_group"
                                class="form-select"
                                required>

                            <option value="">Select Blood Group</option>

                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                            <option>O+</option>
                            <option>O-</option>

                        </select>
                    </div>

                    <!-- Phone -->
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-telephone-fill"></i> Contact Number
                        </label>

                        <input type="tel"
                               name="contact"
                               class="form-control"
                               placeholder="Enter phone number"
                               pattern="[0-9]{10}"
                               title="Enter 10 digit phone number"
                               required>
                    </div>

                    <!-- Buttons -->
                    <div class="d-grid gap-2">

                        <button type="submit"
                                class="btn btn-custom text-white">

                            <i class="bi bi-save"></i> Save Donor

                        </button>

                        <a href="/donors"
                           class="btn btn-secondary">

                           <i class="bi bi-arrow-left"></i> Back

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
```
