<!DOCTYPE html>
<html>
<head>
<title>Blood Bank Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f6f9;
transition:0.4s;
}

body.dark{
background:#1e1e1e;
color:white;
}

.header{
background:linear-gradient(to right,#b30000,#ff4d4d);
color:white;
padding:20px;
text-align:center;
}

.top-controls{
text-align:center;
margin:20px;
}

select,button{
padding:8px 15px;
border-radius:6px;
border:none;
margin:5px;
cursor:pointer;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
margin:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
width:180px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

body.dark .card{
background:#2c2c2c;
}

.charts{
width:80%;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.chart-box{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

body.dark .chart-box{
background:#2c2c2c;
}

canvas{
max-height:220px;
}

.btn{
display:block;
width:200px;
margin:30px auto;
padding:10px;
background:#d10000;
color:white;
text-align:center;
text-decoration:none;
border-radius:8px;
}

</style>
</head>

<body>

<div class="header">
<h1>Blood Bank Analytics</h1>
<p>Visual insights of blood stock distribution</p>
</div>

<div class="top-controls">

<select id="bloodFilter">
<option value="all">All Blood Groups</option>

{% for bg in blood_groups %}
<option value="{{ bg }}">{{ bg }}</option>
{% endfor %}

</select>

<button onclick="toggleDarkMode()">Dark Mode</button>

</div>


<div class="cards">

<div class="card">
<h2>{{ total_donors }}</h2>
<p>Total Donors</p>
</div>

<div class="card">
<h2>{{ total_hospitals }}</h2>
<p>Total Hospitals</p>
</div>

</div>


<div class="charts">

<div class="chart-box">
<h3>Blood Units by Group</h3>
<canvas id="barChart"></canvas>
</div>

<div class="chart-box">
<h3>Blood Stock Distribution</h3>
<canvas id="pieChart"></canvas>
</div>

<div class="chart-box">
<h3>Percentage Share</h3>
<canvas id="doughnutChart"></canvas>
</div>

</div>


<a href="/dashboard" class="btn">Back to Dashboard</a>


<script>

const labels = {{ blood_groups | tojson }};
const data = {{ units | tojson }};


// BAR CHART

const barChart = new Chart(document.getElementById('barChart'),{

type:'bar',

data:{
labels:labels,
datasets:[{
label:'Available Units',
data:data,
backgroundColor:[
'#ff4d4d','#ff8080','#ff9999','#ffb3b3',
'#ff6666','#ff1a1a','#cc0000','#990000'
]
}]
},

options:{
plugins:{
title:{
display:true,
text:'Units Available per Blood Group'
}
},
responsive:true
}

});


// PIE CHART

new Chart(document.getElementById('pieChart'),{

type:'pie',

data:{
labels:labels,
datasets:[{
data:data,
backgroundColor:[
'#ff4d4d','#ff8080','#ff9999','#ffb3b3',
'#ff6666','#ff1a1a','#cc0000','#990000'
]
}]
},

options:{
plugins:{
title:{
display:true,
text:'Blood Stock Distribution'
}
}
}

});


// DOUGHNUT CHART

new Chart(document.getElementById('doughnutChart'),{

type:'doughnut',

data:{
labels:labels,
datasets:[{
data:data,
backgroundColor:[
'#ff4d4d','#ff8080','#ff9999','#ffb3b3',
'#ff6666','#ff1a1a','#cc0000','#990000'
]
}]
},

options:{
plugins:{
title:{
display:true,
text:'Blood Group Percentage Share'
}
}
}

});



// FILTER FUNCTION

document.getElementById("bloodFilter").addEventListener("change",function(){

const selected=this.value;

if(selected==="all"){
barChart.data.datasets[0].data=data;
}
else{

const index=labels.indexOf(selected);

const filtered=new Array(labels.length).fill(0);

filtered[index]=data[index];

barChart.data.datasets[0].data=filtered;

}

barChart.update();

});



// DARK MODE

function toggleDarkMode(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
