<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Hospital</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Segoe UI', sans-serif;
}

.card{
    border:none;
    border-radius:15px;
    width:420px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card-header{
    background:#dc3545;
    color:white;
    font-size:22px;
    font-weight:bold;
    text-align:center;
    border-radius:15px 15px 0 0;
}

.form-control{
    border-radius:8px;
}

.btn-custom{
    width:100%;
    border-radius:8px;
    font-weight:600;
}

.back-btn{
    margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<div class="card-header">
<i class="fa-solid fa-hospital"></i> Add Hospital
</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">
<label class="form-label">Hospital Name</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-building"></i></span>
<input type="text" name="hospital_name" class="form-control" placeholder="Enter hospital name" required>
</div>
</div>

<div class="mb-3">
<label class="form-label">Location</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-location-dot"></i></span>
<input type="text" name="city" class="form-control" placeholder="Enter location" required>
</div>
</div>

<div class="mb-3">
<label class="form-label">Contact Number</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
<input type="text" name="contact" class="form-control" placeholder="Enter contact number" required>
</div>
</div>

<button type="submit" class="btn btn-danger btn-custom">
<i class="fa-solid fa-plus"></i> Add Hospital
</button>

<a href="/dashboard" class="btn btn-secondary btn-custom back-btn">
<i class="fa-solid fa-arrow-left"></i> Back
</a>

</form>

</div>
</div>

</body>
</html>
